name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: |
          npm install
          npm run build:win
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: SpaceField-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: |
          npm install
          npm run build:mac
      - name: Upload Mac dmg
        uses: actions/upload-artifact@v4
        with:
          name: SpaceField-Mac
          path: dist/*.dmg
